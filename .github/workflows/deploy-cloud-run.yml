name: Deploy Cloud Run

run-name: Deploy Cloud Run from ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-cloud-run
  cancel-in-progress: false

env:
  PROJECT_ID: bond-calculator-pl
  PROJECT_NUMBER: '738965529859'
  REGION: europe-central2
  SERVICE: obligacje-calculator
  AR_REPOSITORY: obligacje-calculator
  APP_URL: https://obligacje-calculator-ji72nqwtea-lm.a.run.app
  DEPLOYER_SERVICE_ACCOUNT: github-actions-deployer@bond-calculator-pl.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/738965529859/locations/global/workloadIdentityPools/github-actions/providers/github

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Validate deployment ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Production deploys must run from main. Current ref: ${GITHUB_REF}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install script dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Release gate
        run: pnpm check:release

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          LATEST="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}:latest"
          docker buildx build \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag "${IMAGE}" \
            --tag "${LATEST}" \
            .
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          echo "LATEST=${LATEST}" >> "${GITHUB_ENV}"

      - name: Confirm image
        run: |
          gcloud artifacts docker images describe "${IMAGE}" --project "${PROJECT_ID}" --format='value(image_summary.digest)'

      - name: Validate runtime secrets
        run: |
          missing=0
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::Missing DATABASE_URL repository secret"
            missing=1
          fi
          if [ -z "${{ secrets.AUTH_SECRET }}" ]; then
            echo "::error::Missing AUTH_SECRET repository secret"
            missing=1
          fi
          if [ -z "${{ secrets.SYNC_SECRET }}" ]; then
            echo "::error::Missing SYNC_SECRET repository secret"
            missing=1
          fi
          exit "${missing}"

      - name: Apply reviewed database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec drizzle-kit migrate

      - name: Prepare runtime environment
        run: |
          {
            echo 'DATABASE_URL: "${{ secrets.DATABASE_URL }}"'
            echo 'AUTH_SECRET: "${{ secrets.AUTH_SECRET }}"'
            echo 'SYNC_SECRET: "${{ secrets.SYNC_SECRET }}"'
            echo 'NEXT_PUBLIC_APP_URL: "${{ env.APP_URL }}"'
            echo 'AUTH_TRUST_HOST: "true"'
            echo 'AUTH_GOOGLE_ID: "${{ secrets.AUTH_GOOGLE_ID }}"'
            echo 'AUTH_GOOGLE_SECRET: "${{ secrets.AUTH_GOOGLE_SECRET }}"'
          } > .cloud-run-env.yaml

      - name: Deploy private Cloud Run service
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 1 \
            --memory 512Mi \
            --cpu 1 \
            --execution-environment gen2 \
            --labels "managed-by=github-actions,commit-sha=${GITHUB_SHA},github-run-id=${GITHUB_RUN_ID}" \
            --env-vars-file .cloud-run-env.yaml \
            --quiet

      - name: Capture deployed revision
        run: |
          REVISION="$(gcloud run services describe "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.latestReadyRevisionName)')"
          if [ -z "${REVISION}" ]; then
            echo "::error::Cloud Run did not report a ready revision"
            exit 1
          fi
          echo "REVISION=${REVISION}" >> "${GITHUB_ENV}"
          echo "Deployed revision: ${REVISION}"

      - name: Authenticate health check
        id: health-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ env.APP_URL }}
          id_token_include_email: true

      - name: Verify production
        env:
          IDENTITY_TOKEN: ${{ steps.health-auth.outputs.id_token }}
        run: pnpm ops:verify-prod -- --base-url "${APP_URL}" --allow-missing-oauth --expected-image "${IMAGE}" --expected-revision "${REVISION}"

      - name: Deployment summary
        run: |
          {
            echo "### Cloud Run deployment"
            echo ""
            echo "- Service: \`${SERVICE}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Image: \`${IMAGE}\`"
            echo "- Revision: \`${REVISION}\`"
            echo "- URL: ${APP_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
