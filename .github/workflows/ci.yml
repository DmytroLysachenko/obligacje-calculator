name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check:types

      - name: Lint
        run: pnpm lint

      - name: Release tests
        run: pnpm test:release

      - name: Quality summary
        if: always()
        run: |
          {
            echo "### Quality checks"
            echo ""
            echo "- TypeScript: \`pnpm check:types\`"
            echo "- Lint: \`pnpm lint\`"
            echo "- Release tests: \`pnpm test:release\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Build"
            echo ""
            echo "- Production build: \`pnpm build\`"
          } >> "${GITHUB_STEP_SUMMARY}"
