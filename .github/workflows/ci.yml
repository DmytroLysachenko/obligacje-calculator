name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check:types

      - name: Lint
        run: pnpm lint

      - name: Release tests
        run: pnpm test:release

      - name: Build
        run: pnpm build
