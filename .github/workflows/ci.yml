name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check:types

      - name: Lint
        run: pnpm lint

      - name: Release tests
        run: pnpm test:release

      - name: Quality summary
        if: always()
        run: |
          {
            echo "### Quality checks"
            echo ""
            echo "- TypeScript: \`pnpm check:types\`"
            echo "- Lint: \`pnpm lint\`"
            echo "- Release tests: \`pnpm test:release\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Build"
            echo ""
            echo "- Production build: \`pnpm build\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: obligacje-calculator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build summary
        if: always()
        run: |
          {
            echo "### Docker build"
            echo ""
            echo "- Production image: \`docker/build-push-action\`"
            echo "- Push: disabled"
          } >> "${GITHUB_STEP_SUMMARY}"

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_SMOKE: '1'
      NEXT_PUBLIC_PLAYWRIGHT_SMOKE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Browser smoke and web vitals
        run: pnpm test:browser:ci

      - name: Upload browser reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Browser smoke summary
        if: always()
        run: |
          {
            echo "### Browser smoke"
            echo ""
            echo "- Routes: home, single calculator, comparison, economic data"
            echo "- Checks: title, main landmark, navigation label, console/page errors"
            echo "- Browser gate: \`pnpm test:browser:ci\`"
          } >> "${GITHUB_STEP_SUMMARY}"
