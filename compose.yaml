services:
  app:
    build:
      context: .
      target: base
    command: sh -lc "pnpm install --frozen-lockfile && pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://obligacje:obligacje@postgres:5432/obligacje?sslmode=disable
      AUTH_SECRET: local-development-auth-secret-change-me
      SYNC_SECRET: local-development-sync-secret-change-me
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      HOSTNAME: 0.0.0.0
      PORT: '3000'
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: obligacje
      POSTGRES_USER: obligacje
      POSTGRES_PASSWORD: obligacje
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U obligacje -d obligacje']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_node_modules:
  app_next:
  postgres_data:
